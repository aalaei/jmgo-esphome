# Minimal ESPHome config for JMGO projector control.
# Set the three substitutions below, fill in secrets, and flash.
# All entities, the power switch, and BLE wake come from the package.

substitutions:
  device_name:    "jmgo-n1s-4k"          # ESPHome node ID (lowercase, hyphens)
  friendly_name:  "JMGO Controller"       # HA device name for the ESP32 hardware
  projector_name: "N1S 4K"               # prefix bound to every entity name
  projector_ip:   "192.168.1.100"         # projector static IP

packages:
  jmgo: github://aalaei/jmgo-esphome/jmgo_package.yaml@main

esp32:
  # Set board to match your hardware, e.g.:
  #   esp32-c3-devkitm-1   (ESP32-C3)
  #   esp32-s3-devkitc-1   (ESP32-S3)
  #   esp32-c6-devkitc-1   (ESP32-C6)
  #   esp32-c5-devkitc-1   (ESP32-C5)
  #   esp32dev              (classic ESP32)
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_NIMBLE_ENABLED: "y"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:
logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
