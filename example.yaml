# Minimal ESPHome config for JMGO projector control.
# Set the three substitutions below, fill in secrets, and flash.
# All entities, the power switch, and BLE wake come from the package.

substitutions:
  device_name:   "jmgo-n1s-4k"           # node ID  (lowercase, hyphens)
  friendly_name: "JMGO N1S 4K"           # device label in Home Assistant
  projector_ip:  "192.168.1.100"          # projector static IP

packages:
  jmgo: github://aalaei/jmgo-esphome/jmgo_package.yaml@main

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:
logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
